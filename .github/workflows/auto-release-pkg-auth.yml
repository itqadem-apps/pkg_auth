name: Auto Release pkg_auth

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    name: Bump, tag, release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine bump level from commit message
        id: level
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          # Decision order (first match wins):
          #   1. Conventional Commits breaking marker (`type!:` / `type(scope)!:`)
          #      OR `BREAKING CHANGE` / `BREAKING-CHANGE` anywhere in the message
          #      OR explicit `[major]` tag  → major
          #   2. Conventional Commits `fix:` / `fix(scope):` prefix
          #      OR explicit `[patch]` tag → patch
          #   3. Everything else            → minor (default, preserves prior behavior)
          HEADER=$(printf '%s' "$MSG" | head -n1)
          LEVEL=minor
          if printf '%s' "$MSG" | grep -qE '(^|[[:space:]])BREAKING[- ]CHANGE' \
             || printf '%s' "$MSG" | grep -qE '(^|[[:space:]])\[major\]([[:space:]]|$)' \
             || printf '%s' "$HEADER" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
            LEVEL=major
          elif printf '%s' "$MSG" | grep -qE '(^|[[:space:]])\[patch\]([[:space:]]|$)' \
             || printf '%s' "$HEADER" | grep -qE '^fix(\([^)]*\))?:'; then
            LEVEL=patch
          fi
          echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
          echo "Bump level: $LEVEL (header: $HEADER)"

      - name: Compute next version
        id: version
        env:
          LEVEL: ${{ steps.level.outputs.level }}
        run: |
          set -euo pipefail
          # Extract version from file at repo root
          FILE_VER=$(sed -n 's/^version = "\(.*\)"$/\1/p' "pyproject.toml" | head -n1 || true)

          # Latest tag matching pkg_auth
          LATEST_TAG=$(git tag -l 'pkg_auth-v*' | sed -E 's/^pkg_auth-v//' | sort -V | tail -n1 || true)

          # If the committer manually bumped pyproject.toml past the latest
          # tag, honor that version as the release target (no further bump).
          # This lets a human drive major releases by editing the file —
          # auto-bump only kicks in when file == tag (the normal
          # post-auto-release steady state).
          if [ -n "$FILE_VER" ] && [ -n "$LATEST_TAG" ] \
             && [ "$(printf '%s\n%s\n' "$FILE_VER" "$LATEST_TAG" | sort -V | tail -n1)" = "$FILE_VER" ] \
             && [ "$FILE_VER" != "$LATEST_TAG" ]; then
            NEW_VER="$FILE_VER"
            BASELINE="$LATEST_TAG"
            MODE="honor-manual-bump"
          else
            # Normal flow: baseline = max(FILE_VER, LATEST_TAG), then bump.
            BASELINE=$(printf '%s\n%s\n' "$FILE_VER" "$LATEST_TAG" | sed '/^$/d' | sort -V | tail -n1)
            if [ -z "$BASELINE" ]; then
              echo "No baseline version found; defaulting to 0.1.0" >&2
              BASELINE="0.1.0"
            fi
            MAJOR=$(echo "$BASELINE" | awk -F. '{print $1}')
            MINOR=$(echo "$BASELINE" | awk -F. '{print $2}')
            PATCH=$(echo "$BASELINE" | awk -F. '{print $3}' | sed 's/[^0-9].*$//')
            if ! [[ $MAJOR =~ ^[0-9]+$ && $MINOR =~ ^[0-9]+$ && $PATCH =~ ^[0-9]+$ ]]; then
              echo "Baseline version not semver-like: $BASELINE" >&2
              exit 1
            fi
            case "$LEVEL" in
              major) NEW_VER="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VER="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              *)     echo "Unknown level: $LEVEL" >&2; exit 1 ;;
            esac
            MODE="auto-$LEVEL"
          fi

          # Ensure tag uniqueness; bump the chosen component until free.
          # Parse once from NEW_VER to handle both branches uniformly.
          MAJOR=$(echo "$NEW_VER" | awk -F. '{print $1}')
          MINOR=$(echo "$NEW_VER" | awk -F. '{print $2}')
          PATCH=$(echo "$NEW_VER" | awk -F. '{print $3}' | sed 's/[^0-9].*$//')
          while git rev-parse -q --verify "refs/tags/pkg_auth-v${NEW_VER}" >/dev/null; do
            case "$LEVEL" in
              major) MAJOR=$((MAJOR + 1)); NEW_VER="${MAJOR}.0.0" ;;
              patch) PATCH=$((PATCH + 1)); NEW_VER="${MAJOR}.${MINOR}.${PATCH}" ;;
              *)     MINOR=$((MINOR + 1)); NEW_VER="${MAJOR}.${MINOR}.0" ;;
            esac
          done

          echo "new=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "file=$FILE_VER" >> "$GITHUB_OUTPUT"
          echo "tag=pkg_auth-v$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VER (mode: $MODE, baseline: $BASELINE, level: $LEVEL, file: $FILE_VER, tag: $LATEST_TAG)"

      - name: Update pyproject.toml version
        run: |
          NEW_VER='${{ steps.version.outputs.new }}'
          if [ -z "$NEW_VER" ]; then echo "Missing new version" >&2; exit 1; fi
          # Replace the first occurrence of version = "..."
          sed -i.bak -e "0,/^version = \".*\"/s//version = \"$NEW_VER\"/" pyproject.toml
          rm -f pyproject.toml.bak
          echo "pyproject.toml updated to $NEW_VER"

      - name: Commit version bump
        env:
          NEW_VER: ${{ steps.version.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(pkg_auth): release v${NEW_VER} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }} || true

      - name: Create tag
        env:
          NEW_VER: ${{ steps.version.outputs.new }}
        run: |
          set -e
          TAG="pkg_auth-v${NEW_VER}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally"; else
            git tag -a "$TAG" -m "pkg_auth $NEW_VER"
          fi
          git push origin "$TAG"

      - name: Build pkg_auth artifacts (sdist + wheel)
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Capture artifact names
        id: artifacts
        run: |
          set -e
          WHEEL=$(ls -1 dist/*.whl | head -n1 || true)
          SDIST=$(ls -1 dist/*.tar.gz | head -n1 || true)
          echo "wheel_name=$(basename "$WHEEL")" >> "$GITHUB_OUTPUT"
          echo "sdist_name=$(basename "$SDIST")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: pkg_auth v${{ steps.version.outputs.new }}
          body: |
            Auto release for pkg_auth (mode: ${{ steps.version.outputs.mode }}).

            Install directly from the tag:

            pip install "git+https://github.com/${{ github.repository }}.git@${{ steps.version.outputs.tag }}"

            Or install the wheel directly from the release (public repo):

            pip install "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.artifacts.outputs.wheel_name }}"
          files: |
            dist/*
