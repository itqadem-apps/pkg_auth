name: Release pkg_auth (manual)

# Manual release: set an explicit version, commit + tag it, then hand off to
# the shared publish workflow (build → GitHub Release + PyPI). Publishing logic
# lives only in publish.yml.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 2.2.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Set version + tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      tag: pkg_auth-v${{ inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}" >&2
            exit 1
          fi

      - name: Set pyproject.toml version + commit + tag
        env:
          NEW_VER: ${{ inputs.version }}
        run: |
          set -e
          TAG="pkg_auth-v${NEW_VER}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists" >&2; exit 1
          fi
          sed -i.bak -e "0,/^version = \".*\"/s//version = \"$NEW_VER\"/" pyproject.toml
          rm -f pyproject.toml.bak
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(pkg_auth): release v${NEW_VER} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }} || true
          git tag -a "$TAG" -m "pkg_auth $NEW_VER"
          git push origin "$TAG"

  publish:
    name: Publish
    needs: prepare
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.tag }}
      mode: manual
    secrets: inherit
